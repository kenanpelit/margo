# mlogind colour variables — referenced as `$name` from config.toml.
#
# margo's matugen palette mapped to the greeter's roles. `mlogind sync-theme`
# repaints these from the active wallpaper (margo writes them to
# ~/.config/margo/mlogind-variables.toml on every theme change); until then
# these defaults are margo's baseline palette — baked from the active matugen
# wallpaper theme so the greeter reads cleanly (and matches the desktop) even
# with no synced theme.

# Surfaces / structure
bg           = "#1b1e2b"   # window background  (--surface)
panel_border = "#2f3346"   # panel/background border  (--surface-variant)
field_border = "#5b6184"   # username/password field border  (--outline)

# Text
text         = "#d9def0"   # primary text  (--on-surface)
subtext      = "#a6acc9"   # secondary text / unfocused neighbours
muted        = "#a6acc9"   # hints / movers  (--on-surface-variant)

# Accent / state
accent       = "#5ec8c5"   # focus / active  (--primary)
accent_soft  = "#f5b97a"   # softer accent for selected text  (--tertiary)
danger       = "#f7768e"   # error / no-sessions  (--error)

# Field titles (plain text, not colours)
login_title    = "User"
password_title = "Password"
