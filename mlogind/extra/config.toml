tty = 2

main_log_path = "/var/log/mlogind.log"
client_log_path = "/var/log/mlogind.client.log"
cache_path = "/var/cache/mlogind"

do_log = true
pam_service = "mlogind"
system_shell = "/bin/sh"
initial_path = "/usr/local/sbin:/usr/local/bin:/usr/bin:/bin"
shell_login_flag = "short"
focus_behaviour = "default"

# Colours are `$`-variables resolved from variables.toml (margo's matugen
# palette). `mlogind sync-theme` repaints variables.toml from the active
# wallpaper, so the greeter tracks the desktop theme.

[background]
show_background = true

[background.style]
color = "$bg"
show_border = true
border_color = "$panel_border"

[power_controls]
hint_margin = 3
# Extra entries beyond the base Shutdown/Reboot/Suspend below.
entries = []

[[power_controls.base_entries]]
hint = "Shutdown"
hint_color = "$muted"
hint_modifiers = ""
key = "F1"
cmd = "systemctl poweroff -l"

[[power_controls.base_entries]]
hint = "Reboot"
hint_color = "$muted"
hint_modifiers = ""
key = "F2"
cmd = "systemctl reboot -l"

[[power_controls.base_entries]]
hint = "Suspend"
hint_color = "$muted"
hint_modifiers = ""
key = "F3"
cmd = "systemctl suspend -l"

[environment_switcher]
switcher_visibility = "visible"
toggle_hint = "Sessions %key%"
toggle_hint_color = "$muted"
toggle_hint_modifiers = ""
include_tty_shell = false
remember = true
show_movers = true
mover_color = "$muted"
mover_modifiers = ""
mover_color_focused = "$accent"
mover_modifiers_focused = "bold"
left_mover = "<"
right_mover = ">"
mover_margin = 2
show_neighbours = true
neighbour_color = "$subtext"
neighbour_modifiers = ""
neighbour_color_focused = "$text"
neighbour_modifiers_focused = ""
neighbour_margin = 2
# Active session stands out: brighter text unfocused, accent when focused.
selected_color = "$text"
selected_modifiers = "underlined"
selected_color_focused = "$accent_soft"
selected_modifiers_focused = "bold,underlined"
# Width of each session-name slot; keep ≥ your longest session name
# (e.g. "Margo (UWSM)" = 12). Long names truncate with an ellipsis.
max_display_length = 24
no_envs_text = "No sessions"
no_envs_color = "$text"
no_envs_modifiers = ""
no_envs_color_focused = "$danger"
no_envs_modifiers_focused = "bold"

[username_field]
remember = true

[username_field.style]
show_title = true
title = "$login_title"
title_color = "$subtext"
content_color = "$text"
title_color_focused = "$accent"
content_color_focused = "$accent_soft"
show_border = true
border_color = "$field_border"
border_color_focused = "$accent"
use_max_width = true
max_width = 56

[password_field]
content_replacement_character = "*"

[password_field.style]
show_title = true
title = "$password_title"
title_color = "$subtext"
content_color = "$text"
title_color_focused = "$accent"
content_color_focused = "$accent_soft"
show_border = true
border_color = "$field_border"
border_color_focused = "$accent"
use_max_width = true
max_width = 56

[x11]
xserver_log_path = "/var/log/mlogind.xorg.log"
x11_display = ":1"
xserver_timeout_secs = 60
xserver_path = "/usr/bin/X"
xauth_path = "/usr/bin/xauth"
scripts_path = "/etc/mlogind/wms"
xsetup_path = "/etc/mlogind/xsetup.sh"
xsessions_path = "/usr/share/xsessions"

[wayland]
scripts_path = "/etc/mlogind/wayland"
wayland_sessions_path = "/usr/share/wayland-sessions"

[display]
# "cage": host the greeter in a cage+foot kiosk so every monitor renders at its
# own native KMS resolution (dynamic, auto-detected — no hardcoded mode / port).
# Automatically falls back to the classic in-process TTY greeter if cage or foot
# is missing or cage cannot initialise. Set to "tty" to force the classic path.
host = "cage"
