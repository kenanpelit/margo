tty = 2

main_log_path = "/var/log/mlogind.log"
client_log_path = "/var/log/mlogind.client.log"
cache_path = "/var/cache/mlogind"

do_log = true
pam_service = "mlogind"

# The unprivileged system user the graphical greeter runs as. The greeter runs no
# PAM and holds no credentials, so it has no business being root: it is a GTK
# stack decoding images and shaping text on the most exposed surface the machine
# has. logind grants its session the seat's DRM and input devices via ACLs, so
# this user needs no supplementary groups.
#
# Created by systemd-sysusers from /usr/lib/sysusers.d/mlogind.conf. If it is
# missing, mlogind logs an error and runs the greeter as root rather than leaving
# you unable to log in. Set to "" to keep the greeter root deliberately.
greeter_user = "mlogind-greeter"

# PAM stack that opens the greeter's logind session (/etc/pam.d/mlogind-greeter).
# It authenticates nothing — `pam_permit` — because the greeter user is not a
# login. What it is for is `pam_systemd`, which registers the session with
# class=greeter on the right seat and VT, so libseat can hand margo the DRM node.
greeter_pam_service = "mlogind-greeter"
system_shell = "/bin/sh"
initial_path = "/usr/local/sbin:/usr/local/bin:/usr/bin:/bin"
shell_login_flag = "short"
focus_behaviour = "default"

# Colours are `$`-variables resolved from variables.toml (margo's matugen
# palette). `mlogind sync-theme` repaints variables.toml from the active
# wallpaper, so the greeter tracks the desktop theme.

[background]
show_background = true

[background.style]
color = "$bg"
show_border = true
border_color = "$panel_border"

[power_controls]
hint_margin = 3
# Extra entries beyond the base Shutdown/Reboot/Suspend below.
entries = []

[[power_controls.base_entries]]
hint = "Shutdown"
hint_color = "$muted"
hint_modifiers = ""
key = "F1"
cmd = "systemctl poweroff -l"

[[power_controls.base_entries]]
hint = "Reboot"
hint_color = "$muted"
hint_modifiers = ""
key = "F2"
cmd = "systemctl reboot -l"

[[power_controls.base_entries]]
hint = "Suspend"
hint_color = "$muted"
hint_modifiers = ""
key = "F3"
cmd = "systemctl suspend -l"

[environment_switcher]
switcher_visibility = "visible"
toggle_hint = "Sessions %key%"
toggle_hint_color = "$muted"
toggle_hint_modifiers = ""
include_tty_shell = false
remember = true
show_movers = true
mover_color = "$muted"
mover_modifiers = ""
mover_color_focused = "$accent"
mover_modifiers_focused = "bold"
left_mover = "<"
right_mover = ">"
mover_margin = 2
show_neighbours = true
neighbour_color = "$subtext"
neighbour_modifiers = ""
neighbour_color_focused = "$text"
neighbour_modifiers_focused = ""
neighbour_margin = 2
# Active session stands out: brighter text unfocused, accent when focused.
selected_color = "$text"
selected_modifiers = "underlined"
selected_color_focused = "$accent_soft"
selected_modifiers_focused = "bold,underlined"
# Width of each session-name slot; keep ≥ your longest session name
# (e.g. "Margo (UWSM)" = 12). Long names truncate with an ellipsis.
max_display_length = 24
no_envs_text = "No sessions"
no_envs_color = "$text"
no_envs_modifiers = ""
no_envs_color_focused = "$danger"
no_envs_modifiers_focused = "bold"

[username_field]
remember = true

[username_field.style]
show_title = true
title = "$login_title"
title_color = "$subtext"
content_color = "$text"
title_color_focused = "$accent"
content_color_focused = "$accent_soft"
show_border = true
border_color = "$field_border"
border_color_focused = "$accent"
use_max_width = true
max_width = 56

[password_field]
content_replacement_character = "*"

[password_field.style]
show_title = true
title = "$password_title"
title_color = "$subtext"
content_color = "$text"
title_color_focused = "$accent"
content_color_focused = "$accent_soft"
show_border = true
border_color = "$field_border"
border_color_focused = "$accent"
use_max_width = true
max_width = 56

[x11]
xserver_log_path = "/var/log/mlogind.xorg.log"
x11_display = ":1"
xserver_timeout_secs = 60
xserver_path = "/usr/bin/X"
xauth_path = "/usr/bin/xauth"
scripts_path = "/etc/mlogind/wms"
xsetup_path = "/etc/mlogind/xsetup.sh"
xsessions_path = "/usr/share/xsessions"

[wayland]
scripts_path = "/etc/mlogind/wayland"
wayland_sessions_path = "/usr/share/wayland-sessions"

[display]
# How the greeter is hosted. Every host renders each monitor at its own native
# KMS resolution (dynamic, auto-detected — no hardcoded mode / port) and reads
# the keyboard layout from /etc/vconsole.conf (XKBLAYOUT/XKBVARIANT/XKBOPTIONS).
#
#   "gui"  — a native GTK login card (mgreet) on EVERY connected monitor, hosted
#            under a throwaway root margo instance. The richest greeter; needs
#            `margo`, `mgreet` and `mctl` installed. Falls back to "cage", then
#            "tty", if margo can't start.
#   "cage" — a cage+foot kiosk running the TUI greeter on a single monitor
#            (the last-connected). Falls back to "tty" if cage/foot is missing.
#   "tty"  — the classic in-process TTY greeter (always available).
host = "gui"
# cage output mode (only used when host = "cage"): "last" = greeter on a single
# monitor (the last-connected), centred + native res, follows hotplug. "extend"
# = span all monitors as one surface (login block lands on the monitor seam).
output_mode = "last"
# Seconds of no keyboard or pointer activity before the "gui" greeter goes black
# and forgets a half-typed password. Any key, click or movement wakes it, and
# that first key wakes the screen rather than landing in the password field.
# 0 disables it. Only the "gui" host has a surface to blank.
blank_timeout = 300
# Ask the kernel for the first free VT at startup (VT_OPENQRY) instead of taking
# the top-level `tty` number as-is. `tty` stays the fallback when the query
# fails, and an explicit `--tty N` on the command line always wins. Off by
# default: a fixed, predictable VT is the right call on a machine whose gettys
# are laid out around it.
dynamic_vt = false
# A directory of images the "gui" greeter draws one of at random per greeter
# start. The same pick becomes the compositor wallpaper and the login card's
# backdrop. Empty, unreadable, or holding nothing decodable (png/jpg/jpeg/
# webp/bmp) → the blurred copy of the last user's wallpaper, as before.
background_dir = ""
# Absolute path to a CSS file layered over the "gui" greeter's palette (baked
# default, then the synced matugen theme, then this — this wins). Typical
# content: `:root { --primary: #ff5555; }` token overrides. Empty → off.
greeter_css = ""
# Float the mkeys on-screen keyboard over the "gui" greeter, for touch login.
# Needs `mkeys` installed; silently skipped when it is not.
osk = false

# Log one user in automatically, once per boot, before any greeter appears.
# Enabled when BOTH `user` and `session` are set. `session` must name an entry
# from the session list (e.g. "Margo (UWSM)" — `mlogind envs` prints them).
# When the session ends (or fails to start) the normal greeter takes over, so
# logging out re-greets rather than looping straight back in. The PAM stack's
# auth phase is pam_permit — nobody is at the keyboard — and its session phase
# is the real login stack (/etc/pam.d/mlogind-autologin).
[autologin]
user = ""
session = ""
pam_service = "mlogind-autologin"
