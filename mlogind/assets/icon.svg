<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>mlogind</title>
  <desc>mlogind — margo's TTY login manager. The margo tiled-M mark over a
  dark "console" with a login prompt cue.</desc>

  <!-- Dark rounded "console" background with a subtle margo-accent rim. -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="#15171c"/>
  <rect x="16" y="16" width="480" height="480" rx="104"
        fill="none" stroke="#CE422B" stroke-opacity="0.28" stroke-width="4"/>

  <!-- margo tiled-M mark (rust-orange pillars + a dark valley block). -->
  <g transform="translate(144,72) scale(1.4)">
    <rect x="0"   y="0"  width="34" height="160" rx="4" fill="#CE422B"/>
    <rect x="42"  y="0"  width="34" height="88"  rx="4" fill="#CE422B"/>
    <rect x="42"  y="96" width="76" height="64"  rx="4" fill="#2a2d36"/>
    <rect x="84"  y="0"  width="34" height="88"  rx="4" fill="#CE422B"/>
    <rect x="126" y="0"  width="34" height="160" rx="4" fill="#CE422B"/>
  </g>

  <!-- Login prompt: a password-field line + a blinking-style cursor block. -->
  <rect x="182" y="356" width="120" height="14" rx="7" fill="#3a3f4b"/>
  <rect x="310" y="348" width="20"  height="28" rx="5" fill="#CE422B"/>
</svg>
