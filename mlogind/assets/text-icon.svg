<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="700" height="200">
  <title>mlogind</title>
  <desc>mlogind wordmark — margo's TTY login manager.</desc>

  <!-- margo tiled-M mark (left lockup). -->
  <g transform="translate(36,36) scale(0.8)">
    <rect x="0"   y="0"  width="34" height="160" rx="4" fill="#CE422B"/>
    <rect x="42"  y="0"  width="34" height="88"  rx="4" fill="#CE422B"/>
    <rect x="42"  y="96" width="76" height="64"  rx="4" fill="#2a2d36"/>
    <rect x="84"  y="0"  width="34" height="88"  rx="4" fill="#CE422B"/>
    <rect x="126" y="0"  width="34" height="160" rx="4" fill="#CE422B"/>
  </g>

  <!-- Wordmark: the "m" picks up the margo accent, the rest is on-surface. -->
  <text x="206" y="130"
        font-family="'Maple Mono NF', 'JetBrains Mono', ui-monospace, monospace"
        font-size="104" font-weight="700" letter-spacing="-2">
    <tspan fill="#CE422B">m</tspan><tspan fill="#e8eaed">logind</tspan>
  </text>
</svg>
