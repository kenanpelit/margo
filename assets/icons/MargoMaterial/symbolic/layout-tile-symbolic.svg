<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Master left + stack right (2 rows). Mirrors dwl's classic
       tile layout: one big master pane on the left taking ~half
       the workspace, a vertical column of two smaller stack
       windows on the right. -->
  <rect x="2" y="5" width="11" height="14" fill="currentColor"/>
  <rect x="15" y="5" width="7" height="6" fill="currentColor"/>
  <rect x="15" y="13" width="7" height="6" fill="currentColor"/>
</svg>
