<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Cascaded "deck of cards" — back rectangle peeks behind
       the front. Conveys deck/stack semantics: one focused
       window on top, others queued behind it. -->
  <rect x="5" y="3" width="14" height="14" fill="currentColor" opacity="0.45"/>
  <rect x="8" y="6" width="14" height="14" fill="currentColor" opacity="0.7"/>
  <rect x="2" y="9" width="14" height="12" fill="currentColor"/>
</svg>
