# xdg-desktop-portal preferred-backend mapping for margo sessions.
#
# Screencast / screenshot routing has two viable backends:
#
#   1. `xdg-desktop-portal-wlr` — the wlroots-family backend.
#      Speaks `zwlr_screencopy_manager_v1` + (since 0.8)
#      `ext-image-copy-capture-v1`. margo serves both, but in
#      practice browser meeting clients (Helium, Chromium,
#      Firefox) only enable the *Window* and *Entire Screen*
#      tabs in their share-dialog when the portal is
#      `gnome` — Chromium's WebRTC + xdp-wlr negotiation
#      grays out the source-type tabs in some Chromium forks
#      / Helium builds even though the protocol stack would
#      technically work.
#
#   2. `xdg-desktop-portal-gnome` — the GNOME backend.
#      Standalone of gnome-shell since 50.x: uses libpipewire
#      directly + falls through to whatever Wayland screencast
#      protocol the host compositor speaks. Works on niri,
#      Hyprland, sway, and (verified by the user) margo. The
#      *Window* and *Entire Screen* tabs in browser share
#      dialogs light up reliably; xdp-wlr is left in place
#      as a fallback.
#
# Niri ships with the same default (`default=gnome;gtk;`)
# precisely for this reason — the wlr backend is technically
# capable but the gnome backend produces more compatible
# behaviour with Chromium-based meeting clients.
#
# Per-portal pinning rationale:
#
#   * ScreenCast → margo;gnome
#       margo's own native backend (`margo-portal`): the source
#       picker is mshell's Screenshare chooser and capture is the
#       compositor's own Mutter shim → PipeWire (window + monitor).
#       `;gnome` is the activation fallback if margo-portal is
#       absent. No GNOME portal package needed for screen-share.
#
#   * Screenshot / RemoteDesktop → gnome
#       Not yet implemented natively (Screenshot is the next
#       margo-portal milestone); gnome serves them for now.
#
#   * FileChooser / OpenURI / AppChooser / Notification /
#     Settings / Inhibit → gtk
#       gtk backend renders the standard GNOME-style file picker
#       and notification dialogs. Pulls in xdg-desktop-portal-gtk
#       which margo already lists as a runtime dep in PKGBUILD.
#
#   * Secret → gnome-keyring
#       Standard cross-DE secret store.
#
#   * GlobalShortcuts → none
#       margo's `mctl` covers this need natively; xdp portal
#       layer is a no-op.

[preferred]
default=gnome;gtk
org.freedesktop.impl.portal.FileChooser=gtk
org.freedesktop.impl.portal.OpenURI=gtk
org.freedesktop.impl.portal.AppChooser=gtk
org.freedesktop.impl.portal.Notification=gtk
org.freedesktop.impl.portal.Settings=gtk
org.freedesktop.impl.portal.Secret=gnome-keyring
org.freedesktop.impl.portal.GlobalShortcuts=none
org.freedesktop.impl.portal.Inhibit=gtk
org.freedesktop.impl.portal.ScreenCast=margo;gnome
org.freedesktop.impl.portal.Screenshot=gnome
org.freedesktop.impl.portal.RemoteDesktop=gnome
