# xdg-desktop-portal preferred-backend mapping for margo sessions.
#
# margo speaks the wlroots Wayland protocol family
# (zwlr_screencopy_manager_v1 v3, zwlr_foreign_toplevel_management_v1,
# zwlr_output_management_v1, xdg-output, xdg-activation), so the
# `xdg-desktop-portal-wlr` backend works out of the box for
# screencast / screenshot. No compositor-internal portal binary is
# required — the relay is xdp → xdp-wlr → wlr-screencopy → margo.
#
# Pre-flight: make sure xdg-desktop-portal-wlr is installed
# (`pacman -S xdg-desktop-portal-wlr` on Arch). Without that package
# the wlr backend isn't activatable and screencast falls back to
# `none`.
#
# Per-portal pinning rationale:
#
#   * ScreenCast / Screenshot → wlr
#       Routes capture through xdp-wlr, which uses
#       wlr-screencopy + dmabuf feedback margo already serves.
#       OBS / wf-recorder / browser tab-share / Zoom / Discord all
#       light up via this path.
#
#   * RemoteDesktop → wlr
#       Same backend, same protocol set (input emulation comes from
#       wlr-virtual-pointer / wlr-virtual-keyboard which margo
#       supports).
#
#   * FileChooser / OpenURI / AppChooser / Notification / Settings
#     / Inhibit → gtk
#       gtk backend renders the standard GNOME-style file picker
#       and notification dialogs. Pulls in xdg-desktop-portal-gtk
#       which margo already lists as a runtime dep in PKGBUILD.
#
#   * Secret → gnome-keyring
#       Standard cross-DE secret store. Compatible with seahorse,
#       browser keyrings, and ssh agents.
#
#   * GlobalShortcuts → none
#       margo doesn't expose a GlobalShortcuts portal yet — the
#       portal API is a wrapper for compositors that don't already
#       have an in-tree IPC, which margo does (`mctl`).
#
#   * Background / Lockdown → unset (xdp default)

[preferred]
default=gtk
org.freedesktop.impl.portal.FileChooser=gtk
org.freedesktop.impl.portal.OpenURI=gtk
org.freedesktop.impl.portal.AppChooser=gtk
org.freedesktop.impl.portal.Notification=gtk
org.freedesktop.impl.portal.Settings=gtk
org.freedesktop.impl.portal.Secret=gnome-keyring
org.freedesktop.impl.portal.GlobalShortcuts=none
org.freedesktop.impl.portal.Inhibit=gtk
org.freedesktop.impl.portal.ScreenCast=wlr
org.freedesktop.impl.portal.Screenshot=wlr
org.freedesktop.impl.portal.RemoteDesktop=wlr
