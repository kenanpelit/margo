# xdg-desktop-portal preferred-backend mapping for margo sessions.
#
# margo is gnome-portal-free: screen-share and screenshot are served by
# margo's own native backend (`margo-portal`, the
# `org.freedesktop.impl.portal.desktop.margo` D-Bus name). There is no
# `;gnome` fallback in this file on purpose — installing margo must not
# pull in or activate `xdg-desktop-portal-gnome`.
#
# Per-portal pinning rationale:
#
#   * ScreenCast → margo
#       margo-portal's native backend: the source picker is mshell's
#       Screenshare chooser and capture is the compositor's own Mutter
#       shim → PipeWire (window + monitor). Browser meeting clients
#       (Helium, Chromium, Firefox) get working Window + Entire Screen
#       share tabs with no GNOME portal package.
#
#   * Screenshot → margo
#       margo-portal drives the compositor's `org.gnome.Shell.Screenshot`
#       shim (screencopy → PNG, native colour pick). Interactive region
#       select falls back to a full-frame shot for now.
#
#   * RemoteDesktop → none
#       Not served; no input-injection backend in a margo session.
#
#   * FileChooser / OpenURI / AppChooser / Notification /
#     Settings / Inhibit → gtk
#       gtk backend renders the standard file picker and notification
#       dialogs. Pulls in xdg-desktop-portal-gtk which margo already
#       lists as a runtime dep in PKGBUILD.
#
#   * Secret → gnome-keyring
#       Standard cross-DE secret store (the gnome-keyring daemon, not
#       the gnome portal).
#
#   * GlobalShortcuts → none
#       margo's `mctl` covers this need natively; xdp portal layer is a
#       no-op.

[preferred]
default=gtk
org.freedesktop.impl.portal.FileChooser=gtk
org.freedesktop.impl.portal.OpenURI=gtk
org.freedesktop.impl.portal.AppChooser=gtk
org.freedesktop.impl.portal.Notification=gtk
org.freedesktop.impl.portal.Settings=gtk
org.freedesktop.impl.portal.Secret=gnome-keyring
org.freedesktop.impl.portal.GlobalShortcuts=none
org.freedesktop.impl.portal.Inhibit=gtk
org.freedesktop.impl.portal.ScreenCast=margo
org.freedesktop.impl.portal.Screenshot=margo
org.freedesktop.impl.portal.RemoteDesktop=none
