# cargo-deny — supply-chain gate for the margo workspace.
#
# Focus: RUSTSEC security advisories over the dependency tree the codebase
# never scanned — it vendors third-party code (vendor/wayle-notification),
# pins `smithay` to a git rev, and links a large GTK + wayland + wasmtime
# stack. Non-security checks (duplicate versions, licenses) are configured
# leniently so the gate stays about vulnerabilities, not churn.
#
# CI (see ci.yml) runs this as a SPLIT gate: `bans licenses sources` is a hard
# gate (supply-chain hygiene we control — a bad license, a banned/duplicate
# crate, or an unknown source fails the build), while `advisories` stays
# report-only (RUSTSEC db churn flags transitive deps on its own schedule and
# shouldn't block unrelated pushes — triage those into the ignore list below).

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# Known, tracked exceptions — revisit when the dependency is migrated.
# Real, reachable vulnerabilities with an available fix are NOT parked here;
# they are bumped instead (e.g. anyhow >=1.0.103, memmap2 >=0.9.11).
ignore = [
    # --- Unmaintained crates, no security vuln, no safe upgrade path ---------
    # serde_yaml 0.9 is unmaintained/archived upstream. Migration to an
    # alternative is tracked in docs/code-quality-roadmap.md.
    "RUSTSEC-2024-0320",
    "RUSTSEC-2025-0057", # fxhash — unmaintained (transitive; no replacement wired yet)
    "RUSTSEC-2025-0119", # number_prefix — unmaintained (transitive)
    "RUSTSEC-2024-0436", # paste — unmaintained proc-macro (deep transitive, ubiquitous)
    "RUSTSEC-2026-0173", # proc-macro-error2 — unmaintained (transitive build dep)
    "RUSTSEC-2026-0192", # ttf-parser — unmaintained (via GTK/pango font stack)
    "RUSTSEC-2026-0196", # cgmath — unmaintained (transitive via wgpu/image stack; no replacement)
    "RUSTSEC-2023-0040", # users — unmaintained (via mlogind's lemurs lineage)

    # --- Vulnerabilities with no reachable safe upgrade in our tree ----------
    # users: `root` wrongly appended to group listings. No fixed release
    # exists; the crate is unmaintained. mlogind does not use group listings
    # for authorization, so this is not reachable in our usage.
    "RUSTSEC-2025-0040",
    # quick-xml quadratic-parse / namespace-alloc DoS. Pulled only by
    # `wayland-scanner` (a build-time proc-macro) to parse the *vendored,
    # trusted* Wayland protocol XML — never untrusted input, so the DoS is
    # unreachable. The fix lands in 0.41 but wayland-scanner pins ^0.39
    # (and another dep ^0.37), so 0.41 is unreachable without forking.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",

    # --- wasmtime cluster: feature-gated OFF, not in the shipped binary ------
    # wasmtime/wasmtime-wasi are optional deps behind mshell-plugin-host's
    # `wasm` feature, which is off by default and does NOT build into the
    # released shell — deny only sees them because [graph] all-features=true.
    # Every fix requires a major bump (27 -> 36.0.7+/42.0.2+/43.0.1+), a large
    # API migration for an experimental, unshipped feature. Tracked in
    # docs/code-quality-roadmap.md; revisit when the plugin runtime graduates.
    "RUSTSEC-2025-0046",
    "RUSTSEC-2025-0118",
    "RUSTSEC-2026-0020",
    "RUSTSEC-2026-0021",
    "RUSTSEC-2026-0085",
    "RUSTSEC-2026-0086",
    "RUSTSEC-2026-0087",
    "RUSTSEC-2026-0088",
    "RUSTSEC-2026-0089",
    "RUSTSEC-2026-0091",
    "RUSTSEC-2026-0092",
    "RUSTSEC-2026-0093",
    "RUSTSEC-2026-0094",
    "RUSTSEC-2026-0095",
    "RUSTSEC-2026-0096",
    "RUSTSEC-2026-0149",
    "RUSTSEC-2026-0182",
    "RUSTSEC-2026-0188",
]

[bans]
# The workspace legitimately resolves several major versions of heavy
# transitive deps (nix, zbus via keyring, glib). Surface them as a warning
# rather than failing — de-duplication is a separate, non-security cleanup.
multiple-versions = "warn"
wildcards = "warn"

[licenses]
version = 2
confidence-threshold = 0.9
# Permissive licenses + the workspace's own GPL-3.0. Extend as new deps
# appear, then enable the `licenses` check in ci.yml.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "CC-PDDC",             # oklab — public-domain dedication
    "CDLA-Permissive-2.0", # webpki-roots / webpki-root-certs — TLS root cert data
    "NCSA",                # libfuzzer-sys — permissive, BSD-like (fuzz targets only)
    "0BSD",
    "BSL-1.0",
    "GPL-3.0",
    "GPL-3.0-or-later",
]

# evalexpr (the launcher's calculator / expression provider, pulled by
# mshell-launcher and shipped in mshell) is AGPL-3.0-only. GPLv3 §13 explicitly
# permits combining GPL-3.0 code with AGPL-3.0 code, so this is license-
# compatible with margo (GPL-3.0-or-later); the AGPL network-use clause has no
# effect on a local desktop launcher. Scoped to this single crate on purpose —
# a future AGPL dependency still trips the gate for a fresh, deliberate call.
[[licenses.exceptions]]
name = "evalexpr"
allow = ["AGPL-3.0-only"]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# smithay tracks upstream HEAD (no crates.io release yet) — the single
# allowed git source. See Cargo.toml [workspace.dependencies.smithay].
allow-git = [
    "https://github.com/Smithay/smithay.git",
]
