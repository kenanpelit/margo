# cargo-deny — supply-chain gate for the margo workspace.
#
# Focus: RUSTSEC security advisories over the dependency tree the codebase
# never scanned — it vendors third-party code (vendor/wayle-notification),
# pins `smithay` to a git rev, and links a large GTK + wayland + wasmtime
# stack. Non-security checks (duplicate versions, licenses) are configured
# leniently so the gate stays about vulnerabilities, not churn.
#
# CI currently runs `check advisories bans sources` (see ci.yml) as a
# report-only step. Curate the `licenses` allow-list below and drop the
# `continue-on-error` in CI to promote this to a hard gate.

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# Known, tracked exceptions — revisit when the dependency is migrated.
ignore = [
    # serde_yaml 0.9 is unmaintained/archived upstream. Migration to an
    # alternative is tracked in docs/code-quality-roadmap.md; the crate has
    # no known vulnerability, only maintenance status.
    "RUSTSEC-2024-0320",
]

[bans]
# The workspace legitimately resolves several major versions of heavy
# transitive deps (nix, zbus via keyring, glib). Surface them as a warning
# rather than failing — de-duplication is a separate, non-security cleanup.
multiple-versions = "warn"
wildcards = "warn"

[licenses]
version = 2
confidence-threshold = 0.9
# Permissive licenses + the workspace's own GPL-3.0. Extend as new deps
# appear, then enable the `licenses` check in ci.yml.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "0BSD",
    "BSL-1.0",
    "GPL-3.0",
    "GPL-3.0-or-later",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
# smithay tracks upstream HEAD (no crates.io release yet) — the single
# allowed git source. See Cargo.toml [workspace.dependencies.smithay].
allow-git = [
    "https://github.com/Smithay/smithay.git",
]
