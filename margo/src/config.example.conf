# margo compositor config
# Konum: ~/.config/margo/config.conf
#
# Syntax: key = value
# Bind:   bind = MODIFIERS,key,action[,arg]
#   MODIFIERS: super ctrl shift alt (+ ile birleştir: super+shift)
#   key:       xkbcommon key adı (Return, space, q, 1..9 vb.)
#   action:    spawn, reload_config, killclient, focusstack, view, toggleview,
#              tag (window moves, you stay), tagview (window moves AND you follow),
#              toggletag, setlayout, togglefloating, togglefullscreen,
#              incnmaster, setmfact, togglegaps, zoom, focusmon, tagmon,
#              quit, toggleoverview, force_unlock

# ── Görünüm ───────────────────────────────────────────────────────────────────
borderpx       = 3
enable_gaps    = 1
gappih         = 6
gappiv         = 6
gappoh         = 6
gappov         = 6
# Aliases also work:
# gaps = 6
# gaps_in = 6
# gaps_out = 6
focused_opacity   = 1.0
unfocused_opacity = 0.9
cursor_size        = 24

# ── Çekirdek davranış ────────────────────────────────────────────────────────
focus_on_activate      = 1
sloppyfocus            = 1
warpcursor             = 1
cursor_hide_timeout    = 3
drag_tile_to_tile      = 1
enable_floating_snap   = 1
snap_distance          = 30
enable_hotarea         = 1
hotarea_size           = 10
hotarea_corner         = 3
axis_bind_apply_timeout = 100
axis_scroll_factor     = 1.25

# ── Klavye ───────────────────────────────────────────────────────────────────
xkb_rules_layout  = tr
xkb_rules_variant = f
xkb_rules_options = ctrl:nocaps
repeat_rate       = 35
repeat_delay      = 250
numlockon         = 0

# ── Input ────────────────────────────────────────────────────────────────────
tap_to_click                = 1
tap_and_drag                = 1
drag_lock                   = 1
trackpad_natural_scrolling  = 0
disable_while_typing        = 1
middle_button_emulation     = 1
click_method                = 2
scroll_method               = 1
swipe_min_threshold         = 1
mouse_natural_scrolling     = 0
accel_profile               = 2
accel_speed                 = 1.00

# ── Monitör kuralları ────────────────────────────────────────────────────────
# name: connector adı (DP-3, eDP-1, HDMI-A-1 vb.)
# width/height/refresh: istenilen mod; 0 = preferred modu kullan
# x/y: pozisyon; verilmezse yan yana otomatik
# scale: HiDPI için (örn. 1.5, 2.0)
# rr: transform (0=normal, 1=90°, 2=180°, 3=270°, 4=flipped ...)
# vrr: variable refresh rate
#
# monitorrule = name:DP-3,width:2560,height:1440,refresh:60,x:0,y:0,scale:1
# monitorrule = name:eDP-1,width:1920,height:1200,refresh:60,x:320,y:1440,scale:1

# ── Layout ───────────────────────────────────────────────────────────────────
# tile | scroller | grid | monocle | deck | center_tile | vertical_grid | dwindle | canvas
default_layout  = scroller
default_mfact   = 0.55
default_nmaster = 1
circle_layout   = scroller,tile,center_tile,grid,deck,monocle

scroller_structs                   = 24
scroller_default_proportion         = 0.800
scroller_default_proportion_single  = 0.800
scroller_ignore_proportion_single   = 0
scroller_focus_center               = 1
scroller_prefer_center              = 1
scroller_prefer_overspread          = 0
edge_scroller_pointer_focus         = 1
scroller_proportion_preset          = 1.000,0.800,0.618,0.500

tagrule = id:1,layout_name:scroller
tagrule = id:2,layout_name:scroller
tagrule = id:3,layout_name:scroller
tagrule = id:4,layout_name:scroller
tagrule = id:5,layout_name:scroller
tagrule = id:6,layout_name:scroller
tagrule = id:7,layout_name:scroller
tagrule = id:8,layout_name:scroller
tagrule = id:9,layout_name:scroller

# ── Pencere kuralları ────────────────────────────────────────────────────────
# Syntax (key:value pairs separated by `,`):
#   appid:REGEX             — match by app id (regex)
#   title:REGEX             — match by title (regex)
#   exclude_appid:REGEX     — invert: rule SKIPPED if this matches (niri-style)
#   exclude_title:REGEX
#   tags:N                  — open in tag bitmask 1<<(N-1)
#   monitor:NAME            — pin to a specific output (e.g. eDP-1)
#   isfloating:0|1          — open as floating
#   isfullscreen:0|1
#   width / height          — floating size (px); also forces float
#   offsetx / offsety       — floating position offset from center
#   min_width / min_height  — clamp lower bound (also tiled)
#   max_width / max_height  — clamp upper bound (also tiled, e.g. PiP players)
#   open_focused:0|1        — niri's open-focused (false = no_focus)
#   block_out_from_screencast:1 — privacy: hide from screencopy clients
#   focused_opacity / unfocused_opacity   — 0.0..1.0
#   scroller_proportion / scroller_proportion_single — 0.1..1.0
#   isnoborder / isnoshadow / isnoradius / isnoanimation / noblur — visual
#   isterm:1                — tag as terminal (used for swallowing rules)
#   isnamedscratchpad:1     — opens into a named scratchpad slot
#
# Multiple positive matches AND together; exclude clauses kick in last.

windowrule = scroller_proportion:0.85,scroller_proportion_single:0.9,appid:^(brave-browser|chrome|firefox|librewolf|Chromium)$
windowrule = scroller_proportion:0.75,appid:^(kitty|Alacritty|foot|com\.mitchellh\.ghostty|TmuxKenp|dropdown-terminal|yazi-scratchpad|clipse)$
windowrule = scroller_proportion:0.8,appid:^(Code|vscodium|neovide)$
windowrule = isfloating:1,width:960,height:720,appid:^(xdg-desktop-portal-(gtk|gnome|wlr))$
windowrule = isfloating:1,width:600,height:240,appid:^(polkit-gnome-authentication-agent-1|gcr-prompter|pinentry.*)$
windowrule = isfloating:1,width:960,height:720,title:^(Open File|Choose (File|Folder)|Save As|Confirm to replace files|File Operation Progress)$
windowrule = isfloating:1,width:1180,height:760,appid:^(swappy|satty|com\.github\.jtheoof\.swappy|io\.github\.gabm\.satty|gimp|org\.gimp\.GIMP|krita|org\.kde\.krita)$
windowrule = isfloating:1,width:1180,height:760,title:(?i)(screenshot|swappy|satty)

# Picture-in-picture players: keep them at exactly 640×360 even when their
# layout column would be wider. Pin opacity = 1.0.
windowrule = isfloating:1,width:640,height:360,min_width:640,max_width:640,min_height:360,max_height:360,title:^(?i)picture[- ]in[- ]picture( - mpv)?$
# `mpv` itself but exclude its PiP popup (matched above):
windowrule = isfloating:1,width:640,height:360,appid:^mpv$,exclude_title:^Picture-in-Picture( - mpv)?$,open_focused:1
# Privacy: hide password managers from screencast streams.
windowrule = block_out_from_screencast:1,appid:^(org\.keepassxc\.KeePassXC|KeePassXC|com\.bitwarden\.desktop|Bitwarden|copyq|com\.github\.hluk\.copyq)$
# Block-out incognito browser windows too.
windowrule = block_out_from_screencast:1,appid:^(firefox|librewolf|brave-browser|Chromium)$,title:(?i)(private browsing|private window|incognito|inprivate)

# ── Başlangıç komutları ───────────────────────────────────────────────────────
exec-once = waybar
exec-once = swaybg -i ~/wallpaper.jpg

# ── Keybind'ler ───────────────────────────────────────────────────────────────
# Terminal
bind = super,Return,spawn,foot

# Config reload
bind = super+ctrl,r,reload_config

# Launcher
bind = super,d,spawn,wofi --show drun

# Pencere kapat
bind = super,q,killclient

# Focus
bind = super,j,focusstack,1
bind = super,k,focusstack,-1
bind = super,h,focusdir,left
bind = super,l,focusdir,right
# Alt-tab style: cycle through visible windows on current tag
bind = super,Tab,focusstack,1
bind = super+shift,Tab,focusstack,-1

# Swap master
bind = super,Return,zoom
bind = super+alt,h,exchange_client,left
bind = super+alt,l,exchange_client,right

# Layout boyutu
bind = super+shift,h,setmfact,-0.05
bind = super+shift,l,setmfact,0.05

# Master sayısı
bind = super,i,incnmaster,1
bind = super,d,incnmaster,-1

# Layout seçimi
bind = super,t,setlayout,tile
bind = super,m,setlayout,monocle
bind = super,s,setlayout,scroller
bind = super,g,setlayout,grid
bind = super+ctrl,w,switch_layout
bind = super,r,switch_proportion_preset
bind = super+shift,r,set_proportion,0.500

# Gap toggle
bind = super+shift,g,togglegaps
bind = super+shift,minus,incgaps,-2
bind = super+shift,equal,incgaps,2

# Float / fullscreen
bind = super,f,togglefloating
bind = super+shift,f,togglefullscreen

# Overview
bind = alt,Tab,toggleoverview
bind = super,o,toggleoverview

# Screenshot
# Screenshot dispatch — actions delegate to `margo-screenshot`
# (grim + slurp + wl-clipboard + optional swappy/satty editor).
#
#   Print            region → editor → file + clipboard
#   shift+Print      region → editor → file (no clipboard)
#   ctrl+Print       focused output → editor → file
#   alt+Print        focused window → editor → file
bind = NONE,Print,screenshot-region-ui
bind = shift,Print,screenshot-region
bind = ctrl,Print,screenshot
bind = alt,Print,screenshot-window

# Monitor focus/tagging
bind = super,comma,focusmon,-1
bind = super,period,focusmon,1
bind = super+shift,comma,tagmon,-1
bind = super+shift,period,tagmon,1

# Tag'ler (1-9)
bind = super,1,view,1
bind = super,2,view,2
bind = super,3,view,4
bind = super,4,view,8
bind = super,5,view,16
bind = super,6,view,32
bind = super,7,view,64
bind = super,8,view,128
bind = super,9,view,256

# Pencereyi tag'e taşı
bind = super+shift,1,toggletag,1
bind = super+shift,2,toggletag,2
bind = super+shift,3,toggletag,4
bind = super+shift,4,toggletag,8
bind = super+shift,5,toggletag,16
bind = super+shift,6,toggletag,32
bind = super+shift,7,toggletag,64
bind = super+shift,8,toggletag,128
bind = super+shift,9,toggletag,256

# Tüm tag'ler
bind = super,0,view,4294967295
bind = super,Page_Up,viewtoleft
bind = super,Page_Down,viewtoright
bind = super+ctrl,Page_Up,tagtoleft
bind = super+ctrl,Page_Down,tagtoright

# Çıkış
bind = super+shift,q,quit

# ── Touchpad gesture'ları (Niri/Mango tarzı) ──────────────────────────────────
# Syntax: gesturebind = MODIFIERS,direction,fingers,action,arg
#   MODIFIERS: NONE / super / super+shift / ...
#   direction: up | down | left | right | up_right | up_left | down_left | down_right
#   fingers:   3 veya 4
#
# 3-finger swipe: pencereler arası focus
gesturebind = NONE,left,3,focusdir,left
gesturebind = NONE,right,3,focusdir,right
# 3-finger dikey swipe: tag'ler arası geçiş
gesturebind = NONE,up,3,viewtoleft
gesturebind = NONE,down,3,viewtoright
# 4-finger swipe: workspace navigasyonu + overview
gesturebind = NONE,left,4,viewtoleft
gesturebind = NONE,right,4,viewtoright
gesturebind = NONE,up,4,toggleoverview
gesturebind = NONE,down,4,toggleoverview
