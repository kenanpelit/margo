# margo keybinds — starter set, written on first run.
#
# Managed by Settings → Keybinds (edits there overwrite this file). Syntax is
# the same as config.conf:  bind = MODS,KEY,ACTION[,ARGS]   #"description"
# Generic, convention-aligned (Hyprland / sway / niri blend): app launches use
# `kitty` + first-party mshell / margo tools.

# ── Launch ───────────────────────────────────────────────────────────────────
bind = super,Return,spawn,kitty                              #"Terminal"
bind = super,d,spawn,mshellctl menu app-launcher             #"App launcher"
bind = alt,space,spawn,mshellctl menu app-launcher --tab Run #"Run a command"

# ── Windows ──────────────────────────────────────────────────────────────────
bind = super,q,killclient                                    #"Close window"
bind = super,f,togglefullscreen                              #"Fullscreen"
bind = super+shift,space,togglefloating                      #"Toggle floating"
# Focus — vim keys + arrow-key aliases (whichever you reach for).
bind = super,h,focusdir,left
bind = super,j,focusdir,down
bind = super,k,focusdir,up
bind = super,l,focusdir,right
bind = super,Left,focusdir,left
bind = super,Down,focusdir,down
bind = super,Up,focusdir,up
bind = super,Right,focusdir,right
# Move / swap with the neighbour in a direction.
bind = super+shift,h,exchange_client,left
bind = super+shift,j,exchange_client,down
bind = super+shift,k,exchange_client,up
bind = super+shift,l,exchange_client,right
bind = super+shift,Left,exchange_client,left
bind = super+shift,Down,exchange_client,down
bind = super+shift,Up,exchange_client,up
bind = super+shift,Right,exchange_client,right
# Nudge a floating window by pixels.
bind = super+ctrl,h,movewin,-40,0
bind = super+ctrl,j,movewin,0,40
bind = super+ctrl,k,movewin,0,-40
bind = super+ctrl,l,movewin,40,0
# Resize.
bind = super+ctrl+shift,h,resizewin,-40,0
bind = super+ctrl+shift,j,resizewin,0,40
bind = super+ctrl+shift,k,resizewin,0,-40
bind = super+ctrl+shift,l,resizewin,40,0
bind = super,Tab,focusstack,1
bind = super+shift,Tab,focusstack,-1
bind = super+ctrl,Tab,focuslast
bind = super,z,zoom
bind = super+ctrl,s,sticky_window

# ── Workspaces (tags 1-9, bitmask args) ──────────────────────────────────────
bind = super,1,view,1
bind = super,2,view,2
bind = super,3,view,4
bind = super,4,view,8
bind = super,5,view,16
bind = super,6,view,32
bind = super,7,view,64
bind = super,8,view,128
bind = super,9,view,256
bind = super,0,view,4294967295
bind = super+shift,1,tag,1
bind = super+shift,2,tag,2
bind = super+shift,3,tag,4
bind = super+shift,4,tag,8
bind = super+shift,5,tag,16
bind = super+shift,6,tag,32
bind = super+shift,7,tag,64
bind = super+shift,8,tag,128
bind = super+shift,9,tag,256
bind = super,Page_Up,viewtoleft
bind = super,Page_Down,viewtoright
bind = super+ctrl,Page_Up,tagtoleft
bind = super+ctrl,Page_Down,tagtoright
bind = super+ctrl,Up,tagmon,-1
bind = super+ctrl,Down,tagmon,1
bind = alt,Tab,mru_next
bind = alt+shift,Tab,mru_prev
bind = alt,Return,overview_activate

# ── Layout ───────────────────────────────────────────────────────────────────
bind = super,space,switch_layout                             #"Cycle layout"
bind = super,t,setlayout,tile
bind = super,s,setlayout,scroller
bind = super,m,setlayout,monocle
bind = super+ctrl,g,setlayout,grid
bind = super,r,switch_proportion_preset
bind = super+shift,r,set_proportion,0.500
bind = super+shift,equal,incgaps,2
bind = super+shift,minus,incgaps,-2
bind = super+shift,g,togglegaps

# ── Window groups (tabbed) ───────────────────────────────────────────────────
bind = super,w,togglegroup
bind = super,e,changegroupactive,next
bind = super+shift,e,changegroupactive,prev
bind = super,c,movegroupwindow,next
bind = super+shift,c,movegroupwindow,prev

# ── Scratchpad ───────────────────────────────────────────────────────────────
bind = super+ctrl,Return,toggle_named_scratchpad,^dropdown-terminal$,none,kitty --class dropdown-terminal
bind = super+ctrl,Escape,unscratchpad

# ── Shell (mshell) ───────────────────────────────────────────────────────────
bind = super,a,spawn,mshellctl menu dashboard
bind = super+shift,d,spawn,mshellctl menu control-center
bind = super+ctrl,d,spawn,mshellctl settings open
bind = super,n,spawn,mshellctl menu notifications
bind = super+ctrl,n,spawn,mshellctl menu notifications read
bind = super,v,spawn,mshellctl menu clipboard
bind = super,u,spawn,mshellctl menu ai
bind = super,y,spawn,mshellctl menu wallpaper
bind = super+shift,y,spawn,mshellctl wallpaper next
bind = super,delete,spawn,mshellctl menu session
bind = super,Escape,spawn,mshellctl menu close-all
bind = super,F1,spawn,mshellctl menu keybinds
bind = super,b,spawn,mshellctl bar toggle
bind = super,slash,spawn,mshellctl hidden-bar toggle
bind = alt,f,spawn,mshellctl dock toggle
bind = alt,a,spawn,mshellctl audio switch
bind = ctrl+alt,a,spawn,mshellctl audio switch-mic
bind = NONE,F10,spawn,mshellctl bluetooth toggle

# ── Screenshots ──────────────────────────────────────────────────────────────
bind = NONE,Print,spawn,mshellctl screenshot region satty
bind = shift,Print,spawn,mshellctl screenshot region --save
bind = ctrl,Print,spawn,mshellctl screenshot output
bind = alt,Print,spawn,mshellctl screenshot window
bind = super+shift,s,spawn,mshellctl menu screenshot

# ── Dock (focus/launch the Nth pinned app) ───────────────────────────────────
bind = super+alt,1,spawn,mshellctl dock activate 1
bind = super+alt,2,spawn,mshellctl dock activate 2
bind = super+alt,3,spawn,mshellctl dock activate 3
bind = super+alt,4,spawn,mshellctl dock activate 4
bind = super+alt,5,spawn,mshellctl dock activate 5

# ── VPN (mvpn — ships with margo) ────────────────────────────────────────────
bind = alt,F12,spawn,mvpn toggle --with-blocky
bind = super+ctrl,v,spawn,mshellctl menu vpn

# ── Media / hardware keys ────────────────────────────────────────────────────
bind = NONE,XF86AudioRaiseVolume,spawn,mshellctl audio volume-up
bind = NONE,XF86AudioLowerVolume,spawn,mshellctl audio volume-down
bind = NONE,XF86AudioMute,spawn,mshellctl audio mute
bind = NONE,XF86AudioMicMute,spawn,mshellctl audio mic-mute
bind = NONE,XF86MonBrightnessUp,spawn,mshellctl brightness up
bind = NONE,XF86MonBrightnessDown,spawn,mshellctl brightness down
# Media keys drive the active MPRIS player.
bind = NONE,XF86AudioPlay,spawn,mshellctl media toggle
bind = NONE,XF86AudioPause,spawn,mshellctl media toggle
bind = NONE,XF86AudioPlayPause,spawn,mshellctl media toggle
bind = NONE,XF86AudioNext,spawn,mshellctl media next
bind = NONE,XF86AudioPrev,spawn,mshellctl media prev
# No media-stop verb — consume the key so it can't leak to the focused window.
bind = NONE,XF86AudioStop,spawn,true

# ── On-screen keyboard (mkeys — ships with margo) ────────────────────────────
bind = super,F7,spawn,mkeys toggle

# ── System ───────────────────────────────────────────────────────────────────
# Lock on alt+l (Super+L is taken by vim-style focus-right above).
bind = alt,l,spawn,mlock                                     #"Lock screen"
bind = super,F10,dpms,toggle
bind = super+ctrl,r,reload_config
bind = super+shift,q,quit
bind = super+ctrl+alt,BackSpace,force_unlock
