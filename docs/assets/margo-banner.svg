    <circle cx="28" cy="0" r="4" fill="#CE422B" opacity="0.5"/>
    <circle cx="42" cy="0" r="4" fill="#CE422B" opacity="0.35"/>
    <circle cx="56" cy="0" r="4" fill="#CE422B" opacity="0.2"/>
    <circle cx="70" cy="0" r="4" fill="#666" opacity="0.4"/>
    <circle cx="84" cy="0" r="4" fill="#666" opacity="0.4"/>
    <circle cx="98" cy="0" r="4" fill="#666" opacity="0.4"/>
    <circle cx="112" cy="0" r="4" fill="#666" opacity="0.4"/>
  </g>
</svg>
