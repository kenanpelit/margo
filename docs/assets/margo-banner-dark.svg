<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <title>margo</title>
  <desc>margo Wayland compositor - dark theme banner</desc>
  <rect width="1200" height="300" fill="#0d1117"/>

  <g transform="translate(80, 60)">
    <rect x="0" y="0" width="38" height="180" rx="3" fill="#FF6B47"/>
    <rect x="46" y="0" width="38" height="98" rx="3" fill="#FF6B47"/>
    <rect x="46" y="106" width="84" height="74" rx="3" fill="#30363d"/>
