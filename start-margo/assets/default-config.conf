# margo — default configuration, written automatically on first run.
#
# This is a minimal starter so a brand-new session (e.g. right after install,
# before any dotfiles land) comes up usable instead of a black screen. Tune it
# here, or visually from the bar: Settings → Appearance / Keybinds / …
#
#   Reload after edits :  mctl reload      (or Super+Ctrl+R)
#   Full action list   :  mctl actions --verbose
#   Validate           :  mctl check-config
#   Docs               :  man margo

# ── Appearance ──────────────────────────────────────────────────────
borderpx      = 2
border_radius = 12
gappih = 8
gappiv = 8
gappoh = 8
gappov = 8

# Window-border colours follow the wallpaper palette: mshell regenerates this
# fragment on every matugen change. Silently skipped until it exists.
source = conf.d/colors.conf

# Keybinds live in binds.conf, managed by Settings → Keybinds. Sourced if
# present; a starter binds.conf is written alongside this file on first run.
source = binds.conf
