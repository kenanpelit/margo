# ╔═══════════════════════════════════════════════════════════════════════════╗
# ║ margo — default configuration (written automatically on first run)         ║
# ╚═══════════════════════════════════════════════════════════════════════════╝
#
# A complete, usable starting point so a brand-new session comes up polished
# instead of a black screen. Everything here is generic — no machine-specific
# monitors, per-tag app pins, or personal launch commands. Tune it freely, or
# visually from the bar: Settings → Appearance / Keybinds / …
#
#   Reload after edits :  mctl reload          (or Super+Ctrl+R)
#   Full action list   :  mctl actions --verbose
#   Validate           :  mctl check-config
#   Docs               :  man margo
#
# Keyboard binds live in binds.conf (Settings → Keybinds), sourced at the end.

# ╭─ 1. Appearance ────────────────────────────────────────────────────────────╮
borderpx              = 2
border_radius         = 12
no_border_when_single = 0
no_radius_when_single = 0

# Gaps (inner = between windows, outer = to the screen edge)
gappih = 8
gappiv = 8
gappoh = 8
gappov = 8
smartgaps = 0

# Window opacity. Subtle by default; lower `unfocused_opacity` for more contrast.
focused_opacity   = 1.00
unfocused_opacity  = 0.95
cursor_size        = 24

# Catppuccin Mocha fallback palette. mshell overwrites these from the wallpaper
# (matugen) via the sourced colors.conf below; this block is the startup default.
rootcolor       = 0x1e1e2eff
bordercolor     = 0x313244ff
focuscolor      = 0xcba6f7ff
urgentcolor     = 0xf38ba8ff
scratchpadcolor = 0x74c7ecff
globalcolor     = 0xb4befeff
overlaycolor    = 0x89b4faff
shadowscolor    = 0x11111b99

# Border colours follow the wallpaper palette — mshell regenerates this fragment
# on every matugen change. Sits below the static block so it overrides it.
source = conf.d/colors.conf

# Blur off by default (only shows through translucent windows). Soft drop-shadow.
blur                 = 0
shadows              = 1
shadow_only_floating = 1
layer_shadows        = 0
shadows_size         = 14
shadows_blur         = 26
shadows_position_x   = 0
shadows_position_y   = 4
per_output_frame_clock = true

# Tabbed window groups (Super+W). A thin colour bar marks grouped windows.
group_bar_height     = 22
group_bar_gap        = 4
group_active_color   = 0xcba6f7ff
group_inactive_color = 0x313244ff

# ╭─ 2. Animation (niri-style spring + bezier profile) ────────────────────────╮
tag_animation_direction = 0
tag_carousel = 1
animations = 1
layer_animations = 1

animation_type_open  = zoom
animation_type_close = fade
animation_fade_in  = 1
animation_fade_out = 1
layer_animation_type_open  = slide_in
layer_animation_type_close = slide_out

zoom_initial_ratio = 0.96
zoom_end_ratio = 0.96
fadein_begin_opacity  = 0.80
fadeout_begin_opacity = 1.00

animation_duration_move  = 140
animation_duration_open  = 110
animation_duration_close = 100
animation_duration_tag   = 160
animation_duration_focus = 80
animation_duration_canvas_pan  = 300
animation_duration_canvas_zoom = 300

animation_curve_move = 0.22, 1.00, 0.36, 1.00
animation_curve_open = 0.22, 1.00, 0.36, 1.00
animation_curve_close = 0.30, 0.00, 0.50, 1.00
animation_curve_tag = 0.22, 1.00, 0.36, 1.00
animation_curve_focus = 0.30, 1.00, 0.50, 1.00
animation_curve_opafadein   = 0.16,1.00,0.30,1.00
animation_curve_opafadeout  = 0.50,0.50,0.50,0.50
animation_curve_canvas_pan  = 0.16,1.00,0.30,1.00
animation_curve_canvas_zoom = 0.16,1.00,0.30,1.00

animation_clock_move = spring
animation_clock_open = bezier
animation_clock_close = bezier
animation_clock_tag = bezier
animation_clock_focus = bezier
animation_clock_layer = bezier

animation_spring_stiffness     = 800.0
animation_spring_damping_ratio = 1.0
animation_spring_mass          = 1.0

# ╭─ 3. Core behaviour ────────────────────────────────────────────────────────╮
focus_on_activate      = 1
focus_cross_monitor    = 0
exchange_cross_monitor = 0
focus_cross_tag        = 0
view_current_to_back   = 1
sloppyfocus            = 1
warpcursor             = 0
cursor_hide_timeout    = 3
xwayland_persistence   = 1

# Keep newly mapped background-tag windows receiving frame callbacks for this
# many ms so Electron/CEF apps launched at login (Spotify, Discord, …) finish
# rendering without you visiting their tag first. 0 = strict visible-only.
warmup_hidden_ms       = 20000

drag_tile_to_tile              = 1
drag_corner                    = 4
drag_warp_cursor               = 1
drag_tile_refresh_interval     = 8.0
drag_floating_refresh_interval = 8.0

enable_floating_snap = 1
snap_distance        = 30

enable_hotarea = 1
hotarea_size   = 10
hotarea_corner = 3
ov_tab_mode    = 0
overviewgappi  = 12
overviewgappo  = 60

axis_bind_apply_timeout = 100
axis_scroll_factor      = 1.25

syncobj_enable          = 0
allow_tearing           = 2
allow_shortcuts_inhibit = 1

scratchpad_cross_monitor = 1
single_scratchpad        = 1

# ╭─ 4. Keyboard & input ──────────────────────────────────────────────────────╮
# Change the layout to taste (e.g. `tr`, `de`, `us,ru`). The pill in the bar
# cycles configured layouts; add more as `xkb_rules_layout = us,tr`.
xkb_rules_layout  = us
repeat_rate       = 35
repeat_delay      = 250
numlockon         = 0

tap_to_click = 1
tap_and_drag = 1
drag_lock    = 1
trackpad_natural_scrolling = 0
disable_while_typing = 1
middle_button_emulation = 1
click_method  = 2
scroll_method = 1
send_events_mode = 0

mouse_natural_scrolling = 0
accel_profile = 2
accel_speed   = 1.00
swipe_min_threshold = 30

# ╭─ 5. Environment ───────────────────────────────────────────────────────────╮
env = XDG_CURRENT_DESKTOP,margo
env = XDG_SESSION_DESKTOP,margo
env = XDG_SESSION_TYPE,wayland
env = GDK_BACKEND,wayland,x11
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

# ╭─ 6. Layout ────────────────────────────────────────────────────────────────╮
# Layout types: tile | scroller | grid | monocle | deck | center_tile |
#                 right_tile | vertical_scroller | vertical_tile |
#                 vertical_grid | vertical_deck | tgmix | canvas | dwindle
default_layout  = tile
default_mfact   = 0.55
default_nmaster = 1
new_is_master   = 0
center_when_single_stack = 1
# `switch_layout` (Super+Ctrl+W) cycles this list.
circle_layout   = tile,scroller,grid,monocle,deck,dwindle

# Scroller (PaperWM-style horizontal scroll)
scroller_default_proportion        = 0.800
scroller_default_proportion_single = 0.800
scroller_focus_center              = 1
scroller_proportion_preset         = 1.000,0.800,0.618,0.500
overview_style = scroller
scroller_overview_zoom = 0.30
scroller_overview_gap  = 20
scroller_overview_loop = 1

# ╭─ 7. Window rules (generic dialogs / privacy / swallowing) ─────────────────╮
# Float common dialogs + utility windows at a sensible size, centred.
windowrule = isfloating:1,width:960,height:720,appid:^(xdg-desktop-portal-(gtk|gnome|wlr))$
windowrule = isfloating:1,width:600,height:240,appid:^(polkit-gnome-authentication-agent-1|gcr-prompter|pinentry.*)$
windowrule = isfloating:1,width:640,height:260,title:^(Authentication Required|Unlock Keyring|OpenSSH Authentication Passphrase)$
windowrule = isfloating:1,width:960,height:720,title:^(Open File|Choose (File|Folder)|Save As|Confirm to replace files|File Operation Progress)$
windowrule = isfloating:1,width:900,height:650,appid:^(blueman-manager|nm-connection-editor|org\.gnome\.Settings|gnome-disks)$
windowrule = isfloating:1,width:540,height:640,appid:^(org\.gnome\.Calculator|kcalc|qalculate-gtk)$
windowrule = isfloating:1,width:700,height:450,title:^Volume Control$

# Screenshot editors: float, overlay, focused.
windowrule = isfloating:1, isoverlay:1, open_focused:1, noswallow:1, appid:^(swappy|com\.gabm\.satty)$

# Password / clipboard / auth windows: no blur, masked in screencast.
windowrule = noblur:1,block_out_from_screencast:1,appid:^(org\.keepassxc\.KeePassXC|KeePassXC|com\.bitwarden\.desktop|Bitwarden|com\.1password\.1Password|1Password|com\.github\.hluk\.copyq|copyq|org\.gnome\.World\.Secrets|seahorse|gcr-prompter|pinentry.*)$
windowrule = block_out_from_screencast:1,title:(?i)(password|passphrase|authentication|unlock|secret|two-factor|verification code|one-time|otp)

# Games / gamescope: tearing on, effects off.
windowrule = force_tearing:1,noblur:1,isnoshadow:1,isnoanimation:1,appid:^(gamescope|steam_app_.*|lutris)$

# Terminal swallowing for common terminals.
windowrule = isterm:1,appid:^(kitty|Alacritty|com\.mitchellh\.ghostty|foot|dropdown-terminal)$
# Dropdown terminal scratchpad (Super+Ctrl+Return) geometry.
windowrule = isnamedscratchpad:1,width:1600,height:600,offsetx:0,offsety:-100,appid:^dropdown-terminal$

# Roomier scroller columns for browsers / editors / terminals.
windowrule = scroller_proportion:0.85,scroller_proportion_single:0.9,appid:^(brave-browser|chrome|firefox|librewolf|Chromium|zen|helium.*|Helium.*)$
windowrule = scroller_proportion:0.8,appid:^(Code|vscodium|neovide)$

# ╭─ 8. Layer rules ───────────────────────────────────────────────────────────╮
layerrule = noanim:1,noshadow:1,noblur:1,layer_name:^mshell-(frame|spacer|wallpaper|invisible-root)$
layerrule = noanim:1,noshadow:1,noblur:1,layer_name:^gtk4-layer-shell$
layerrule = noanim:1,noblur:1,layer_name:^(selection|screenshot).*
layerrule = animation_type_open:zoom,animation_type_close:zoom,layer_name:^(rofi|fuzzel|launcher).*
layerrule = animation_type_open:slide,animation_type_close:slide,layer_name:^(control-center|dash|session-menu|wallpaper|system-monitor|settings).*
layerrule = noanim:1,noshadow:1,noblur:1,layer_name:^(notifications|toast|osd|volume|brightness|mshell-(notifications|toast|osd|volume|brightness)).*

# ╭─ 9. Monitors (examples — uncomment + adjust for your displays) ────────────╮
#monitorrule = name:DP-1,width:2560,height:1440,refresh:144,x:0,y:0,scale:1
#monitorrule = name:eDP-1,width:1920,height:1080,refresh:60,x:0,y:1440,scale:1

# ╭─ 10. Startup ──────────────────────────────────────────────────────────────╮
# The shell (bar / launcher / notifications / settings) is mshell, started by
# systemd --user (bound to margo-session.target). If it isn't, uncomment:
#exec-once = mshell

# ╭─ 11. Mouse / gesture / scroll bindings ────────────────────────────────────╮
mousebind = super,lmb,moveresize,curmove
mousebind = super,rmb,moveresize,curresize

overview_transition_ms = 180
overview_zoom = 1.00
overview_selected_border_multiplier = 1.6
overview_dim_alpha = 0.7
overview_cycle_order = mru
hot_corner_top_left = toggle_overview
hot_corner_dwell_ms = 100

# 3-finger: focus left/right (h) or browser tab-cycle (v, app-gated); 4-finger:
# tag nav (h) / overview (v); 4-finger up-diagonal: roam monitors.
gesturebind = NONE,left,3,focusdir,left
gesturebind = NONE,right,3,focusdir,right
gesturebind = NONE,up,3,sendkey,ctrl+shift+Tab,^(brave.*|chrome.*|Chromium|firefox|librewolf|zen|helium.*|Helium.*)$,focusdir:up
gesturebind = NONE,down,3,sendkey,ctrl+Tab,^(brave.*|chrome.*|Chromium|firefox|librewolf|zen|helium.*|Helium.*)$,focusdir:down
gesturebind = NONE,left,4,viewtoleft
gesturebind = NONE,right,4,viewtoright
gesturebind = NONE,up,4,toggle_overview
gesturebind = NONE,down,4,toggle_overview
gesturebind = NONE,up_left,4,focusmon,left
gesturebind = NONE,up_right,4,focusmon,right

axisbind = super,UP,focusdir,left
axisbind = super,DOWN,focusdir,right

# ╭─ 12. Twilight (blue-light filter) ─────────────────────────────────────────╮
# Off by default. Enable from Settings, or set `twilight = 1` + a mode. Geo mode
# needs your latitude/longitude; schedule/manual/static don't.
twilight = 0
twilight_mode = schedule
twilight_day_temp = 6500
twilight_night_temp = 3500

# ╭─ 13. Keybinds ─────────────────────────────────────────────────────────────╮
source = binds.conf
