[package]
name = "mshell-margo-client"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
description = "Margo compositor client for MShell — mirrors the wayle-hyprland API surface so OkShell-derived widgets stay verbatim."
repository.workspace = true
license.workspace = true

[dependencies]
anyhow.workspace = true
futures.workspace = true
libc.workspace = true
# inotify-based reactive watch on $XDG_RUNTIME_DIR/margo/state.json.
# Replaces the 250 ms steady-state poll with kernel-driven wakeups:
# every mctl / arrange / focus event in margo rewrites state.json,
# and inotify delivers that within ~1 ms instead of the worst-case
# 250 ms poll latency. The polling path stays as a long-interval
# fallback (2 s) in case inotify init fails or the parent directory
# doesn't exist at startup.
notify.workspace = true
serde.workspace = true
serde_json.workspace = true
tokio.workspace = true
# sync feature for tokio_stream::wrappers::BroadcastStream, used to
# turn the event_tx `tokio::sync::broadcast` channel into a Stream
# the OkShell-style widget watchers consume.
tokio-stream = { workspace = true, features = ["sync"] }
tracing.workspace = true
