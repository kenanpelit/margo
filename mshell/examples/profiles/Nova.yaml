    - MediaPlayer
    minimum_width: 460
    maximum_height: 0
  session_menu:
    position: Top
    widgets:
    - Session
    minimum_width: 420
    maximum_height: 0
  settings_menu:
    position: Top
    widgets: []
    minimum_width: 780
    maximum_height: 0
  dashboard_menu:
    position: Top
    widgets:
    - Clock
    - !Spacer
      size: 8
    - !Container
      widgets:
      - !Container
        widgets:
        - CalendarGrid
        - Weather
        spacing: 10
        orientation: Vertical
        minimum_width: 400
        homogeneous: false
        fill: true
      - !Container
        widgets:
        - OverviewIntel
        - Connectivity
        - CompactAudio
        - SystemStatus
        - MediaPlayer
        spacing: 8
        orientation: Vertical
        minimum_width: 400
        homogeneous: false
        fill: true
      spacing: 12
      orientation: Horizontal
      minimum_width: 0
      homogeneous: true
      fill: false
    - !Spacer
      size: 10
    - !QuickActions
      widgets:
      - AirplaneMode
      - Nightlight
      - ColorPicker
      - Wallpaper
      - Screenshot
      - Settings
      - Logout
      - Lock
      - Reboot
      - Shutdown
