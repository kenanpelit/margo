# ╭───────────────────────────────────────────────────────────────────────╮
# │ Nova — the full-featured margo shell profile                            │
# │                                                                         │
# │ The curated "everything on" showcase: rich top bar, every menu wired    │
# │ up, Material-You theming, dock, control center, bluetooth auto-connect,  │
# │ and sensible idle / clipboard / session defaults. Pick it in the setup   │
# │ wizard, then tune anything from Settings.                               │
# │                                                                         │
# │ Edits made through Settings are re-serialised by the shell, so this      │
# │ shipped copy documents the schema, not your saved state. Machine-        │
# │ specific bits (wallpaper folder, weather location, autostart, alarms,    │
# │ password-store, bluetooth devices, custom session commands) are          │
# │ intentionally left blank/neutral here.                                  │
# ╰───────────────────────────────────────────────────────────────────────╯
general:
  clock_format_24_h: true
  weather_location_query:
    type: Coordinates
    lat: 0.0
    lon: 0.0
  weather_saved_locations: []
  temperature_unit: Metric
  show_screen_corners: false
  screen_corner_radius: 24
  network_osd_enabled: false
  media_seek_step_seconds: 10
  media_large_album_art: true
theme:
  icons:
    shell_icon_theme: MargoMaterial
    app_icon_theme: kora
    apply_theme_filter: false
    filter_strength: 1.0
    monochrome_strength: 0.0
    contrast_strength: 1.0
  theme: Default
  matugen:
    preference: Darkness
    scheme_type: TonalSpot
    mode: Dark
    contrast: 0.0
    auto_polarity: false
  css_file: ''
  attributes:
    font:
      primary: Maple Mono NF
      secondary: Maple Mono NF
      tertiary: Maple Mono NF
      monospace: ''
    sizing:
      radius_widget: 12
      radius_window: 12
      border_width: 2
      bar_hover_strength: 14
      settings_font_scale: 1.05
      font_scale: 1.0
      bar_font_scale: 0.9
    window_opacity: 1.0
bars:
  frame:
    enable_frame: true
    monitor_filter: []
  widgets:
    system_update:
      check_interval_minutes: 180
      check_repo: true
      check_aur: true
      check_flatpak: true
    hidden_bar:
      start_expanded: false
      auto_expand: true
      hover_delay_ms: 0
      auto_collapse: true
      collapse_delay_ms: 1000
    catwalk:
      minimum_threshold: 10
      hide_background: false
    custom_widgets: []
  top_bar:
    enabled: true
    minimum_height: 36
    reveal_by_default: true
    auto_hide_delay_ms: 400
    left_widgets:
    - MargoTags
    - Separator
    - MargoLayoutSwitcher
    - Separator
    - ActiveWindow
    - Separator
    - MediaPlayer
    center_widgets:
    - Weather
    - Separator
    - Dashboard
    - Separator
    - Catwalk
    - Separator
    - Notifications
    - Separator
    - HiddenBar
    right_widgets:
    - Network
    - Separator
    - CpuDashboard
    - Separator
    - AudioDashboard
    - Separator
    - RecordingIndicator
    - Bluetooth
    - Separator
    - VpnIndicator
    - Valent
    - Separator
    - Clipboard
    - Podman
    - Dns
    - Ufw
    - Power
    - ControlCenter
    - Separator
    - Tray
    hidden_widgets:
    - Twilight
    - AlarmClock
    - KeepAwake
    - Notes
    - !Custom plugin:ambient-sound:ambient
    - !Custom plugin:breathing:breathing
    - !Custom plugin:musiclyrics:lyrics
    - Keybinds
  bottom_bar:
    enabled: false
    minimum_height: 28
    reveal_by_default: true
    auto_hide_delay_ms: 400
    left_widgets:
    - Separator
    - !Spacer 8
    - ActiveWindow
    center_widgets:
    - Separator
    - !Spacer 8
    - MediaPlayer
    - !Spacer 8
    - Separator
    right_widgets:
    - Power
    - !Spacer 8
    - Separator
    - Tray
    - Separator
    hidden_widgets: []
  islands: false
