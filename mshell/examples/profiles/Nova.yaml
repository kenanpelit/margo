  dns_menu:
    position: TopRight
    widgets:
    - Dns
    minimum_width: 420
    maximum_height: 0
  podman_menu:
    position: TopRight
    widgets:
    - Podman
    minimum_width: 540
    maximum_height: 0
  notes_menu:
    position: TopRight
    widgets:
    - Notes
    minimum_width: 540
    maximum_height: 0
  ip_menu:
    position: TopRight
    widgets:
    - Ip
    minimum_width: 380
    maximum_height: 0
  network_menu:
    position: TopRight
    widgets:
    - Network
    minimum_width: 460
    maximum_height: 0
  power_menu:
    position: TopRight
    widgets:
    - Power
    minimum_width: 360
    maximum_height: 0
  bluetooth_menu:
    position: TopRight
    widgets:
    - Bluetooth
    minimum_width: 400
    maximum_height: 0
  cpu_dashboard_menu:
    position: TopRight
    widgets:
    - CpuDashboard
    minimum_width: 380
    maximum_height: 0
  audio_dashboard_menu:
    position: TopRight
    widgets:
    - AudioDashboard
    minimum_width: 400
    maximum_height: 0
  system_update_menu:
    position: TopRight
    widgets:
    - SystemUpdate
    minimum_width: 460
    maximum_height: 620
  valent_menu:
    position: TopRight
    widgets:
    - Valent
    minimum_width: 460
    maximum_height: 620
  keep_awake_menu:
    position: Top
    widgets:
    - KeepAwake
    minimum_width: 450
    maximum_height: 0
  weather_menu:
    position: Top
    widgets:
    - Weather
    minimum_width: 640
    maximum_height: 640
  twilight_menu:
    position: TopLeft
    widgets:
    - Twilight
    minimum_width: 360
    maximum_height: 0
  keybinds_menu:
    position: Top
    widgets:
    - Keybinds
    minimum_width: 820
    maximum_height: 1440
  ssh_menu:
    position: TopRight
    widgets:
    - SshSessions
    minimum_width: 460
    maximum_height: 720
  media_player_menu:
    position: TopLeft
