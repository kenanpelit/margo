    minimum_width: 280
    maximum_height: 0
  left_menu_expansion_type: AlwaysExpanded
  right_menu_expansion_type: AlwaysExpanded

# ── Notifications ───────────────────────────────────────────────────────
notifications:
  notification_position: Right
  blocklist: []
  show_close_button: true
  show_action_buttons: false
  group_notifications: false
  popup_width: 460

# ── Wallpaper ───────────────────────────────────────────────────────────
# Point `wallpaper_dir` at your wallpaper folder (or let the wizard set it).
# Rotation is on by default once a folder is chosen.
wallpaper:
  wallpaper_dir: ''
  content_fit: Cover
  apply_theme_filter: false
  theme_filter_strength: 1.0
  rotation_enabled: true
  rotation_interval_minutes: 5
  rotation_mode: Sequential

# ── Clock formats (tempo) ───────────────────────────────────────────────
tempo:
  clock_format: '%a %d %b %H:%M'
  formats:
  - '%H:%M'
  - '%H:%M:%S'
  - '%a %d %b %H:%M'
  - '%d.%m.%Y %H:%M'

# ── Idle behaviour ──────────────────────────────────────────────────────
# Dim → lock → suspend timeouts (minutes).
idle:
  dim_enabled: true
  dim_timeout_minutes: 20
  lock_enabled: true
  lock_timeout_minutes: 25
  suspend_enabled: true
  suspend_timeout_minutes: 30

# ── Session commands ────────────────────────────────────────────────────
# Override the power-menu actions; blank = the built-in default
# (systemctl / the in-process lock). Non-empty values run via `sh -c`.
session:
  lock_command: ''
  logout_command: ''
  suspend_command: systemctl suspend -i
  reboot_command: ''
  shutdown_command: systemctl poweroff -i

# ── Clipboard history ───────────────────────────────────────────────────
clipboard:
  max_entries: 1000
  persist: All
  clear_policy: Never
  clear_after_hours: 24
  skip_sensitive: false
  image_history: true
  density: Comfortable

# ── Launcher ────────────────────────────────────────────────────────────
# Autostart entries are per-machine, so the shipped profile leaves them
# empty. Add your own from Settings → Launcher.
launcher:
  autostart_scripts: []

# ── Valent (KDE Connect) ────────────────────────────────────────────────
valent:
  main_device_id: ''

# ── Dock ────────────────────────────────────────────────────────────────
dock:
  icon_size: 24
  show_tooltips: true
  show_running: true

# ── Pass (password-store launcher) ──────────────────────────────────────
# Defaults to ~/.password-store when blank; set your store from
# Settings → Launcher.
pass:
  store_path: ''
