  blocklist: []
  show_close_button: true
  show_action_buttons: false
  group_notifications: false
  popup_width: 460
  history_limit: 200
wallpaper:
  wallpaper_dir: ''
  content_fit: Cover
  apply_theme_filter: false
  theme_filter_strength: 1.0
  rotation_enabled: true
  rotation_interval_minutes: 5
  rotation_mode: Sequential
  daily_wallpaper_enabled: false
  daily_wallpaper_source: nasa
  daily_wallpaper_locale: ''
tempo:
  clock_format: '%a %d %b %H:%M'
  formats:
  - '%H:%M'
  - '%H:%M:%S'
  - '%a %d %b %H:%M'
  - '%d.%m.%Y %H:%M'
idle:
  dim_enabled: true
  dim_timeout_minutes: 20
  lock_enabled: true
  lock_timeout_minutes: 25
  suspend_enabled: true
  suspend_timeout_minutes: 30
session:
  lock_command: ''
  logout_command: ''
  suspend_command: systemctl suspend -i
  reboot_command: ''
  shutdown_command: systemctl poweroff -i
clipboard:
  max_entries: 1000
  persist: All
  clear_policy: Never
  clear_after_hours: 24
  skip_sensitive: true
  image_history: true
  density: Comfortable
launcher:
  autostart_scripts: []
valent:
  main_device_id: ''
dock:
  icon_size: 24
  show_tooltips: true
  show_running: true
