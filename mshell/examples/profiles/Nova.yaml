# ╭───────────────────────────────────────────────────────────────────────╮
# │ Nova — the full-featured margo shell profile                            │
# │                                                                         │
# │ The curated "everything on" experience: a rich top bar, every menu      │
# │ wired up, Material-You theming, twilight, dock, and sensible idle /     │
# │ clipboard / session defaults. This is the showcase config — pick it in  │
# │ the setup wizard, then tune anything from Settings.                     │
# │                                                                         │
# │ Edits made through Settings are re-serialised by the shell, so these    │
# │ comments only live in the shipped copy — they document the schema, not  │
# │ your saved state. Machine-specific bits (wallpaper folder, weather      │
# │ location, autostart) are intentionally left blank/neutral here.         │
# ╰───────────────────────────────────────────────────────────────────────╯

# ── General ─────────────────────────────────────────────────────────────
# Clock format, weather location, units. Set your weather location from
# Settings → Weather (left at neutral coordinates here).
general:
  clock_format_24_h: true
  weather_location_query:
    type: Coordinates
    lat: 0.0
    lon: 0.0
  temperature_unit: Metric
  show_screen_corners: false
  screen_corner_radius: 24
  network_osd_enabled: false

# ── Theme ───────────────────────────────────────────────────────────────
# Material-You (matugen) dark theme on the bundled MargoMaterial icon set.
# Fonts default to Maple Mono NF; install it or change them in Settings.
theme:
  icons:
    shell_icon_theme: MargoMaterial
    app_icon_theme: MargoMaterial
    apply_theme_filter: false
    filter_strength: 1.0
    monochrome_strength: 0.0
    contrast_strength: 1.0
  theme: Default
  matugen:
    preference: Darkness
    scheme_type: TonalSpot
    mode: Dark
    contrast: 0.0
  css_file: ''
  attributes:
    font:
      primary: Maple Mono NF
      secondary: Maple Mono NF
      tertiary: Maple Mono NF
      monospace: ''
    sizing:
      radius_widget: 12
      radius_window: 12
      border_width: 2
      bar_hover_strength: 14
      settings_font_scale: 1.05
      font_scale: 1.0
      bar_font_scale: 1.0
    window_opacity: 1.0

# ── Bars ────────────────────────────────────────────────────────────────
# A populated top bar (the bottom bar is empty/hidden). Widget order is
# left → center → right; reorder or move widgets from Settings → Bar.
bars:
  frame:
    enable_frame: true
    monitor_filter: []
  widgets:
    system_update:
      check_interval_minutes: 180
      check_repo: true
      check_aur: true
      check_flatpak: false
  top_bar:
    minimum_height: 40
    reveal_by_default: true
    left_widgets:
    - Twilight
    - MargoTags
    - MargoLayoutSwitcher
    - ActiveWindow
    - MediaPlayer
    center_widgets:
    - Weather
    - Dashboard
    - Notifications
    - KeepAwake
    right_widgets:
    - Network
    - CpuDashboard
    - RecordingIndicator
    - Clipboard
    - Valent
    - AudioDashboard
    - Bluetooth
    - VpnIndicator
    - Notes
    - Podman
    - Dns
    - Ufw
    - Power
    - Tray
  bottom_bar:
    minimum_height: 0
    reveal_by_default: false
    left_widgets: []
    center_widgets: []
    right_widgets: []

# ── Menus ───────────────────────────────────────────────────────────────
# Each bar widget opens a menu surface; position + size are tuned per menu.
menus:
  clock_menu:
    position: Top
    widgets:
    - Calendar
    - !Spacer
      size: 20
    - Weather
    minimum_width: 410
    maximum_height: 0
  clipboard_menu:
