# ╭───────────────────────────────────────────────────────────────────────╮
# │ Default — the clean, minimal margo shell profile                        │
# │                                                                         │
# │ A quiet starting point: a single top bar with just the essentials, the  │
# │ stock Material-You dark theme, and built-in defaults for everything     │
# │ else. Pick this in the setup wizard for a bare canvas, then add widgets │
# │ and menus from Settings as you go. (The richer "Nova" profile turns     │
# │ everything on.)                                                         │
# │                                                                         │
# │ This profile is an overlay: any key it omits falls back to margo's      │
# │ compiled-in defaults, so it stays short on purpose.                     │
# ╰───────────────────────────────────────────────────────────────────────╯

# ── General ─────────────────────────────────────────────────────────────
general:
  clock_format_24_h: true

# ── Theme ───────────────────────────────────────────────────────────────
# Stock Material-You (matugen) dark theme on the bundled MargoMaterial icons.
theme:
  icons:
    shell_icon_theme: MargoMaterial
    app_icon_theme: MargoMaterial
  theme: Default
  matugen:
    mode: Dark

# ── Bars ────────────────────────────────────────────────────────────────
# One top bar with the essentials; the bottom bar stays hidden. Add or
# reorder widgets from Settings → Bar.
bars:
  top_bar:
    reveal_by_default: true
    left_widgets:
    - MargoTags
    - ActiveWindow
    center_widgets:
    - Clock
    right_widgets:
    - Network
    - AudioDashboard
    - Bluetooth
    - Clipboard
    - Notifications
    - Power
    - Tray
  bottom_bar:
    reveal_by_default: false
    left_widgets: []
    center_widgets: []
    right_widgets: []

# ── Wallpaper ───────────────────────────────────────────────────────────
# Set your wallpaper folder from Settings → Wallpaper (or the setup wizard).
wallpaper:
  wallpaper_dir: ''
