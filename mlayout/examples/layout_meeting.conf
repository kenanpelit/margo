# Meeting projector — mirror laptop content to an external HDMI capture.
#@ name = "Meeting"
#@ shortcut = m

#@ output_name = "laptop"
#@ color = 11
monitorrule = name:eDP-1,width:1920,height:1200,refresh:60,x:0,y:0,scale:1

#@ output_name = "projector"
#@ color = 7
monitorrule = name:HDMI-A-1,width:1920,height:1080,refresh:60,x:1920,y:0,scale:1
