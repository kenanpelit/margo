# Margo smoke — runs scripts/smoke-winit.sh end-to-end under Xvfb so we
# catch regressions in the nested winit path that `cargo test` can't:
# margo --help, --winit boot, kitty as the test client, mctl status /
# reload / dispatch focusstack / killclient, post-kill empty status.
#
# Runs in an Arch container (same reason as ci.yml — current GTK / the
# real target distro) with a software GL stack (mesa llvmpipe). Arch
# doesn't ship `xvfb-run`, so we launch Xvfb by hand and export DISPLAY.
#
# Trigger is manual (workflow_dispatch) for now: nested winit + software
# GL under Xvfb is inherently flakier than the unit suite, so it stays
# opt-in until proven stable rather than gating every push. Real DRM
# tests are out of scope — runners expose no CRTC; see
# docs/manual-checklist.md for hardware validation.

name: smoke

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  winit:
    name: smoke-winit (xvfb, arch)
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    timeout-minutes: 25

    steps:
      # margo's compositor link deps (no GTK — we build just margo + mctl).
      # No kitty / Xvfb here: the nested winit boot needs a real GPU
      # session, which a hosted runner doesn't have, so CI runs the script
      # with SMOKE_NO_NESTED=1 (build + --help + config-parse, headless).
      # The full nested e2e is a local check — run scripts/smoke-winit.sh
      # inside your margo / Wayland desktop.
      - name: System dependencies (pacman)
        run: |
          pacman -Syu --noconfirm --needed \
            git rustup clang pkgconf \
            wayland wayland-protocols libinput libxkbcommon \
            mesa libdrm seatd pixman libgudev systemd-libs \
            pcre2 pam cairo pango dbus pipewire
          rustup default stable

      - uses: actions/checkout@v5

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Clean-room release build of the binaries the smoke script probes
      # for (target/release/{margo,mctl}) — distinct from ci.yml's cached
      # workspace build.
      - name: cargo build (release)
        run: cargo build --release -p margo -p mctl

      - name: smoke (build + launch + config, headless)
        run: scripts/smoke-winit.sh
        env:
          SMOKE_VERBOSE: '1'
          SMOKE_NO_NESTED: '1'

      - name: Upload smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: smoke-logs
          path: /tmp/margo-smoke-*/
          retention-days: 7
