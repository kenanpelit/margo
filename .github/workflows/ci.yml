# Margo CI — build / test / clippy / config-validate.
#
# Runs inside an Arch Linux container (not ubuntu-latest) on purpose:
# the GTK shell crates (mshell, mpicker, mvisual, …) use gtk4-rs 0.10,
# which needs GTK >= 4.19 at build time. GitHub's Ubuntu runners ship
# GTK 4.14, so a `--workspace` build can't link there. Arch always
# tracks current GTK (4.22+) and is margo's real target distro
# (CachyOS/Arch), so the whole workspace builds and the full test suite
# runs against the same library versions users get.
#
# Not covered here:
#   * scripts/smoke-winit.sh — end-to-end nested boot under Xvfb, in
#     `smoke.yml` (manual / on-demand; it needs a software GL stack).
#   * Real DRM session — impossible on GitHub-hosted runners. Manual
#     post-install validation lives in docs/manual-checklist.md.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # The full workspace (compositor + GTK shell + mplay's EGL/mpv stack) is
  # large; on the ubuntu-latest host disk a debug `--workspace` build + test +
  # clippy fills the device. Drop debuginfo and incremental artifacts in CI —
  # they're the bulk of target/ and useless for a pass/fail gate.
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"
  CARGO_INCREMENTAL: "0"

jobs:
  check:
    name: build / test / clippy / config (arch)
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    timeout-minutes: 30

    steps:
      # Build/link deps mirror the PKGBUILD depends + makedepends:
      # smithay's native stack (wayland, libinput, libxkbcommon, libseat,
      # mesa, libdrm, libgudev, systemd-libs), the regex crate's PCRE2
      # backend, PAM/cairo/pango for mlock, and the full GTK4 + GStreamer
      # + audio stack for mshell. `rustup` provides a current toolchain
      # with clippy (margo is Rust edition 2024, needs >= 1.85). git is
      # required by actions/checkout inside the container.
      - name: System dependencies (pacman)
        run: |
          pacman -Syu --noconfirm --needed \
            git rustup clang pkgconf \
            wayland wayland-protocols libinput libxkbcommon \
            mesa libdrm seatd pixman libgudev systemd-libs \
            pcre2 pam cairo pango dbus \
            mpv \
            gtk4 gtk4-layer-shell gdk-pixbuf2 graphene fontconfig freetype2 \
            gstreamer gst-plugins-base gst-plugins-base-libs gst-plugins-good \
            alsa-lib libpulse pipewire
          rustup default stable
          rustup component add clippy

      - uses: actions/checkout@v5

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Build the two PKGBUILD groups separately — NOT `--workspace`.
      # Building the compositor and the GTK/tokio shell stack in one
      # cargo invocation lets feature unification enable shell-only
      # features (tokio, zbus via mpicker → mshell-screenshot → wayle-*)
      # on the compositor's shared deps, producing a margo binary that
      # differs from what the package ships. This split mirrors the
      # PKGBUILD so CI validates the real production build configuration.
      - name: cargo build (compositor group)
        run: cargo build -p margo -p start-margo -p mctl -p mlock -p mlayout -p mscreenshot -p mvisual -p mlogind -p mpower -p mplay -p mdots -p mcal

      - name: cargo build (shell group)
        run: cargo build -p mshell -p mshellctl -p mshellshare -p mpicker -p mwizard -p mkeys -p mvpn -p margo-portal

      - name: cargo test
        # Tests cover every crate; feature unification in the test build
        # doesn't ship, so `--workspace` is fine here.
        run: cargo test --workspace

      - name: cargo fmt (gate)
        # Formatting is deterministic on the pinned toolchain
        # (rust-toolchain.toml), so this is a hard gate.
        run: cargo fmt --all -- --check

      - name: cargo clippy (gate)
        # Now gating: rust-toolchain.toml pins the toolchain, so the lint set
        # is stable and `-D warnings` won't flip red on unrelated rolling-Rust
        # drift. Bump the pin deliberately (with a clippy pass) to adopt new
        # lints. `--all-targets` so tests/examples are linted too.
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: design lint (gate)
        # DESIGN.md §15 L1–L7: no hardcoded hex, no raw ≥4px
        # spacing/radius/font, --radius-widget only in bar/frame styles,
        # no literal transition durations, no Popover primary surfaces,
        # no add_css_class(""), no DragSource/DropTarget row reorder.
        run: ./scripts/design-lint.sh

      - name: panic ratchet (gate)
        # Non-test .unwrap()/.expect()/panic!() count may only go down.
        # Baseline lives in scripts/panic-baseline.txt; the script fails in
        # BOTH directions (up = regression, down = please lock the cleanup
        # in by lowering the baseline).
        run: ./scripts/panic-ratchet.sh

      - name: mctl check-config (bundled example)
        # Validates that an example user config parses without unknown
        # fields, regex compile errors, or duplicate binds. Falls back to
        # a minimal stub if no example is checked in.
        run: |
          if [ -f assets/example/config.conf ]; then
            CFG=assets/example/config.conf
          elif [ -f margo/src/config.example.conf ]; then
            CFG=margo/src/config.example.conf
          else
            CFG=/tmp/margo-min.conf
            cat > "$CFG" <<'EOF'
          # Minimal smoke config used by CI when no example ships.
          modkey = super
          bind = super,Return,spawn,kitty
          EOF
          fi
          ./target/debug/mctl check-config --config "$CFG"

  # Supply-chain scan over the vendored + git-pinned + large dependency tree
  # (the audit's "no dependency-CVE scanning" gap). Runs on the plain Ubuntu
  # runner (no GTK needed — it reads Cargo.lock). Split into a hard gate + a
  # report-only step. Config: deny.toml.
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      # Hard gate — supply-chain hygiene WE control. A dependency with a
      # disallowed license, a banned/duplicate crate, or an unknown
      # registry/git source fails the build. These only change when we change
      # deps, so they won't flip red on unrelated rolling churn.
      - name: cargo-deny (bans / licenses / sources)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check bans licenses sources
      # Report-only — RUSTSEC advisories. Upstream advisory-db updates flag
      # transitive deps on their own schedule; a newly-published advisory
      # shouldn't block an unrelated push. Surfaced here, then triaged into
      # deny.toml's ignore list (bumped if a fix exists, parked with a note if
      # not).
      - name: cargo-deny (advisories, report-only)
        uses: EmbarkStudios/cargo-deny-action@v2
        continue-on-error: true
        with:
          command: check advisories
