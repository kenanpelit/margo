# Margo CI — build / test / clippy / config-validate.
#
# Runs inside an Arch Linux container (not ubuntu-latest) on purpose:
# the GTK shell crates (mshell, mpicker, mvisual, …) use gtk4-rs 0.10,
# which needs GTK >= 4.19 at build time. GitHub's Ubuntu runners ship
# GTK 4.14, so a `--workspace` build can't link there. Arch always
# tracks current GTK (4.22+) and is margo's real target distro
# (CachyOS/Arch), so the whole workspace builds and the full test suite
# runs against the same library versions users get.
#
# Not covered here:
#   * scripts/smoke-winit.sh — end-to-end nested boot under Xvfb, in
#     `smoke.yml` (manual / on-demand; it needs a software GL stack).
#   * Real DRM session — impossible on GitHub-hosted runners. Manual
#     post-install validation lives in docs/manual-checklist.md.

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: build / test / clippy / config (arch)
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    timeout-minutes: 30

    steps:
      # Build/link deps mirror the PKGBUILD depends + makedepends:
      # smithay's native stack (wayland, libinput, libxkbcommon, libseat,
      # mesa, libdrm, libgudev, systemd-libs), the regex crate's PCRE2
      # backend, PAM/cairo/pango for mlock, and the full GTK4 + GStreamer
      # + audio stack for mshell. `rustup` provides a current toolchain
      # with clippy (margo is Rust edition 2024, needs >= 1.85). git is
      # required by actions/checkout inside the container.
      - name: System dependencies (pacman)
        run: |
          pacman -Syu --noconfirm --needed \
            git rustup clang pkgconf \
            wayland wayland-protocols libinput libxkbcommon \
            mesa libdrm seatd pixman libgudev systemd-libs \
            pcre2 pam cairo pango dbus \
            gtk4 gtk4-layer-shell gdk-pixbuf2 graphene fontconfig freetype2 \
            gstreamer gst-plugins-base gst-plugins-base-libs gst-plugins-good \
            alsa-lib libpulse pipewire
          rustup default stable
          rustup component add clippy

      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Build the two PKGBUILD groups separately — NOT `--workspace`.
      # Building the compositor and the GTK/tokio shell stack in one
      # cargo invocation lets feature unification enable shell-only
      # features (tokio, zbus via mpicker → mshell-screenshot → wayle-*)
      # on the compositor's shared deps, producing a margo binary that
      # differs from what the package ships. This split mirrors the
      # PKGBUILD so CI validates the real production build configuration.
      - name: cargo build (compositor group)
        run: cargo build -p margo -p start-margo -p mctl -p mlock -p mlayout -p mscreenshot -p mvisual

      - name: cargo build (shell group)
        run: cargo build -p mshell -p mshellctl -p mshellshare -p mpicker -p mwizard -p margo-portal

      - name: cargo test
        # Tests cover every crate; feature unification in the test build
        # doesn't ship, so `--workspace` is fine here.
        run: cargo test --workspace

      - name: cargo clippy (advisory)
        # Non-gating on purpose. CI runs against Arch's rolling Rust, so
        # each toolchain bump can introduce new lints (e.g. 1.95 added
        # clippy::derivable_impls hits) — a hard `-D warnings` gate would
        # turn unrelated toolchain drift into red builds. clippy still
        # runs for visibility; promote it back to a gate with a pinned
        # toolchain + a cleanup pass if desired.
        run: cargo clippy --workspace --all-targets

      - name: mctl check-config (bundled example)
        # Validates that an example user config parses without unknown
        # fields, regex compile errors, or duplicate binds. Falls back to
        # a minimal stub if no example is checked in.
        run: |
          if [ -f assets/example/config.conf ]; then
            CFG=assets/example/config.conf
          elif [ -f margo/src/config.example.conf ]; then
            CFG=margo/src/config.example.conf
          else
            CFG=/tmp/margo-min.conf
            cat > "$CFG" <<'EOF'
          # Minimal smoke config used by CI when no example ships.
          modkey = super
          bind = super,Return,spawn,kitty
          EOF
          fi
          ./target/debug/mctl check-config --config "$CFG"
