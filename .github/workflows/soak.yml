# Margo proptest soak — weekly deep fuzz of the pure algebra crates.
#
# The regular ci.yml runs the proptest suites at their default case
# count (256) as a smoke gate. This job re-runs the same suites at
# 200k cases (niri runs its layout-op fuzzer at the same depth in CI)
# so the long tail — the right_tile lone-master class of bug that only
# a deep run finds — surfaces on a schedule instead of on a user's
# monitor. Failures persist their seed into the committed
# *.proptest-regressions files, so a red run is reproducible locally
# with a plain `cargo test`.
#
# Only the two pure crates are soaked: margo-layouts (arrange algebra)
# and margo-config (parser + validator). Neither needs the GTK stack,
# so this runs on the plain Arch container with a minimal dep set —
# margo-config still links libxkbcommon (keysym parsing for keybinds)
# and pcre2 (window-rule regexes).
#
# Note on strategies: generate factors as integers and divide rather than
# drawing from an inclusive float range. proptest 1.11's uniform float
# sampler panics on its own invariant for a fraction of such draws, which
# at this depth is a near-certainty — it took down the very first
# scheduled run, masking a real layout bug underneath it.

name: soak

on:
  schedule:
    # Mondays 03:17 UTC — off the busy top-of-hour cron window.
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      cases:
        description: "Proptest cases per property"
        required: false
        default: "200000"

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_TEST_DEBUG: "0"
  CARGO_INCREMENTAL: "0"

jobs:
  soak:
    # One job per crate, in parallel. They were steps of a single job until
    # 2026-07-20, when the first real scheduled run failed in margo-layouts
    # and the margo-config step never executed — a red week that told us
    # nothing about the parser. Independent jobs also mean independent
    # timeout budgets, which matters because the two are nowhere near the
    # same cost: margo-layouts finishes 200k in well under a minute,
    # margo-config takes over an hour (it parses a full config document per
    # case).
    name: soak ${{ matrix.crate }}
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: margo-layouts
            test: proptest_arrange
          - crate: margo-config
            test: proptest_parser

    steps:
      - name: System dependencies (pacman)
        run: |
          pacman -Syu --noconfirm --needed \
            git rustup clang pkgconf pcre2 libxkbcommon
          rustup default stable

      - uses: actions/checkout@v5

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Soak ${{ matrix.crate }}
        env:
          PROPTEST_CASES: ${{ github.event.inputs.cases || '200000' }}
        run: |
          cargo test --locked -p ${{ matrix.crate }} \
            --test ${{ matrix.test }} -- --nocapture
