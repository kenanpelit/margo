name: docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'road_map.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Pages deploy needs these. Per-job permissions stay tight by default.
permissions:
  contents: read
  pages: write
  id-token: write

# Coalesce concurrent runs — only the latest deploys.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install docs deps
        run: pip install -r requirements.txt

      - name: Sync repo-root markdown into docs/
        # The roadmap, CHANGELOG, and CONTRIBUTING file are source-of-
        # truth at the repo root (referenced by README, by mctl + by
        # every PR). Copy them into docs/ at build time so the site
        # renders the current version without forcing two copies in git.
        run: |
          cp road_map.md     docs/roadmap.md
          cp CHANGELOG.md    docs/changelog.md
          cp CONTRIBUTING.md docs/contributing.md

      - name: Build site
        # Not --strict: road_map.md is source-of-truth at the repo root
        # and uses repo-root-relative links (e.g. `docs/protocol-
        # comparison.md`) that render correctly on GitHub but resolve
        # differently once copied into docs/ for mkdocs. Strict mode
        # turns those intentional dual-context links into hard errors.
        # The site still builds; warnings are logged, not fatal.
        run: mkdocs build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
